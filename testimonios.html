<script>
    const track = document.getElementById("sliderTrack");
    const step = 300; // Ancho imagen + gap aproximado

    function autoScroll() {
        if (track.scrollLeft >= (track.scrollWidth - track.clientWidth - 5)) {
            track.scrollTo({ left: 0, behavior: "smooth" });
        } else {
            track.scrollBy({ left: step, behavior: "smooth" });
        }
    }

    let timer = setInterval(autoScroll, 3000);

    // Pausar si el usuario interactúa
    track.addEventListener("mousedown", () => clearInterval(timer));
    track.addEventListener("touchstart", () => clearInterval(timer));
</script>
