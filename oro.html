<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ELITE COSTA RICA - ORO 10K</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        .btn-regresar { position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 12px; font-weight: 600; text-transform: uppercase; transition: all 0.3s ease; z-index: 10; }
        .btn-regresar:hover { background: rgba(255, 255, 255, 0.1); color: #ffffff; border-color: rgba(255, 255, 255, 0.3); }
        .titulo-oro { color: #ffffff !important; text-shadow: none !important; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-top: 20px; }
        .tipo-oro.active, .cat-oro.active { background: #D4AF37 !important; color: #10171f !important; border-color: #ffd700 !important; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        .filtros-principales button { border: 1px solid rgba(255, 215, 0, 0.3); transition: all 0.3s ease; cursor: pointer; }
        .filtros-principales button:hover { border-color: #ffd700; background: rgba(212, 175, 55, 0.1); }
        header { position: relative; text-align: center; padding: 40px 20px; }
        /* Grid del catálogo */
        #catalogo-oro { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="btn-regresar">← Regresar</a>
    <img class="logo" src="assets/logo.png" alt="Elite Gold" style="width: 80px;">
    <h1 class="titulo titulo-oro">ELITE COSTA RICA</h1>

    <div class="filtros-principales">
        <button class="tipo-oro active" data-tipo="Todos" onclick="filtrarOro('Todos')">Todos</button>
        <button class="tipo-oro" data-tipo="Oro Nacional" onclick="filtrarOro('Oro Nacional')">Oro Nacional</button>
        <button class="tipo-oro" data-tipo="Oro Italiano" onclick="filtrarOro('Oro Italiano')">Oro Italiano</button>
    </div>

    <div class="filtros-principales" style="margin-top: 10px;">
        <button class="cat-oro" data-cat="Cadenas" onclick="filtrarOro('Cadenas')">Cadenas</button>
        <button class="cat-oro" data-cat="Pulseras" onclick="filtrarOro('Pulseras')">Pulseras</button>
        <button class="cat-oro" data-cat="Anillos" onclick="filtrarOro('Anillos')">Anillos</button>
        <button class="cat-oro" data-cat="Argollas" onclick="filtrarOro('Argollas')">Argollas</button>
        <button class="cat-oro" data-cat="Aretes" onclick="filtrarOro('Aretes')">Aretes</button>
    </div>
</header>

<div id="catalogo-oro">
    <p id="loaderOro" style="color: white; text-align: center; grid-column: 1/-1;">Cargando colección...</p>
</div>

<div id="visorImagen" onclick="this.style.display='none'" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;">
    <img id="imagenGrande" src="" style="max-width:90%; max-height:90%; border: 3px solid #D4AF37;">
</div>

<script src="script_oro.js" defer></script>
</body>
</html>
