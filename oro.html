<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ELITE COSTA RICA - ORO 10K</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        .btn-regresar { position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 12px; font-weight: 600; text-transform: uppercase; transition: all 0.3s ease; z-index: 10; }
        .btn-regresar:hover { background: rgba(255, 255, 255, 0.1); color: #ffffff; border-color: rgba(255, 255, 255, 0.3); }
        .titulo-oro { color: #ffffff !important; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-top: 20px; }
        
        /* Estilos de botones activos para todas las categorías de filtro */
        .tipo-oro.active, .gen-oro.active, .cat-oro.active { 
            background: #D4AF37 !important; 
            color: #10171f !important; 
            border-color: #ffd700 !important; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); 
        }

        .filtros-principales button { border: 1px solid rgba(255, 215, 0, 0.3); transition: all 0.3s ease; cursor: pointer; border-radius: 20px; padding: 8px 15px; background: transparent; color: white; margin: 3px; font-size: 13px; }
        header { position: relative; text-align: center; padding: 40px 10px; }

        /* Contenedor principal de Tarjetas Full Width */
        #catalogo-oro {
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding: 10px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Tarjeta Estilo Glass */
        .card-oro-full {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        .header-card-oro {
            background: rgba(212, 175, 55, 0.1);
            color: #D4AF37;
            text-align: center;
            padding: 8px;
            font-size: 0.75em;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .card-oro-full img {
            width: 100%;
            height: auto;
            display: block;
        }

        .info-card-oro {
            padding: 20px;
            text-align: center;
        }

        .info-card-oro h3 {
            color: #fff;
            margin: 0 0 10px 0;
            font-size: 1.2em;
            text-transform: uppercase;
        }

        .info-card-oro p {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 20px;
            white-space: pre-line;
        }

        .btn-cotizar-oro-full {
            background: linear-gradient(135deg, #D4AF37, #AA8928);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: 900;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="btn-regresar">← Regresar</a>
    <img class="logo" src="assets/logo.png" alt="Elite Gold" style="width: 80px;">
    <h1 class="titulo titulo-oro">ELITE COSTA RICA</h1>

    <div class="filtros-principales">
        <button class="tipo-oro active" data-val="Todos" onclick="filtrarTipo('Todos')">Todos</button>
        <button class="tipo-oro" data-val="Oro Nacional" onclick="filtrarTipo('Oro Nacional')">Oro Nacional</button>
        <button class="tipo-oro" data-val="Oro Italiano" onclick="filtrarTipo('Oro Italiano')">Oro Italiano</button>
    </div>

    <div class="filtros-principales" style="margin-top: 10px;">
        <button class="gen-oro active" data-val="Todos" onclick="filtrarGenero('Todos')">Todos</button>
        <button class="gen-oro" data-val="Hombre" onclick="filtrarGenero('Hombre')">Hombre</button>
        <button class="gen-oro" data-val="Mujer" onclick="filtrarGenero('Mujer')">Mujer</button>
        <button class="gen-oro" data-val="Niños" onclick="filtrarGenero('Niños')">Niños</button>
    </div>

    <div class="filtros-principales" style="margin-top: 10px;">
        <button class="cat-oro" data-val="Cadenas" onclick="filtrarCat('Cadenas')">Cadenas</button>
        <button class="cat-oro" data-val="Pulseras" onclick="filtrarCat('Pulseras')">Pulseras</button>
        <button class="cat-oro" data-val="Anillos" onclick="filtrarCat('Anillos')">Anillos</button>
        <button class="cat-oro" data-val="Argollas" onclick="filtrarCat('Argollas')">Argollas</button>
        <button class="cat-oro" data-val="Aretes" onclick="filtrarCat('Aretes')">Aretes</button>
    </div>
</header>

<div id="catalogo-oro">
    <p id="loaderOro" style="color: white; text-align: center;">Cargando colección...</p>
</div>

<div id="visorImagen" onclick="this.style.display='none'" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;">
    <img id="imagenGrande" src="" style="max-width:95%; max-height:95%; border: 2px solid #D4AF37; border-radius: 10px;">
</div>

<script src="script_oro.js" defer></script>
</body>
</html>
